<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gear/Settings icon -->
  <circle cx="100" cy="100" r="80" fill="url(#gearGradient)" />
  <circle cx="100" cy="100" r="60" fill="#4B5563" />
  <!-- Gear teeth -->
  <g fill="#6B7280">
    <rect x="95" y="10" width="10" height="20" rx="2" />
    <rect x="95" y="170" width="10" height="20" rx="2" />
    <rect x="10" y="95" width="20" height="10" rx="2" />
    <rect x="170" y="95" width="20" height="10" rx="2" />
    <rect x="30" y="30" width="15" height="15" rx="2" transform="rotate(45 37.5 37.5)" />
    <rect x="155" y="30" width="15" height="15" rx="2" transform="rotate(-45 162.5 37.5)" />
    <rect x="30" y="155" width="15" height="15" rx="2" transform="rotate(-45 37.5 162.5)" />
    <rect x="155" y="155" width="15" height="15" rx="2" transform="rotate(45 162.5 162.5)" />
  </g>
  <!-- Code symbol </> -->
  <text x="100" y="115" font-family="monospace" font-size="48" font-weight="bold" fill="white" text-anchor="middle">&lt;/&gt;</text>
</svg>
